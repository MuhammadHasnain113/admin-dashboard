<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | Insights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
</head>
<body class="bg-gray-100 flex">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block shrink-0">
        <div class="text-2xl font-bold mb-10 text-purple-400">ADMIN PRO</div>
        <nav class="space-y-4">
            <a href="dashboard.html" class="block p-3 hover:bg-slate-800 rounded">Dashboard</a>
            <a href="users.html" class="block p-3 hover:bg-slate-800 rounded">Users</a>
            <a href="products.html" class="block p-3 hover:bg-slate-800 rounded">Products</a>
            <a href="analytics.html" class="block p-3 bg-purple-600 rounded shadow-lg">Analytics</a>
            <a href="notifications.html" class="block p-3 hover:bg-slate-800 rounded">Notifications</a>
            <a href="settings.html" class="block p-3 hover:bg-slate-800 rounded">Settings</a>
            <button onclick="AuthService.logout()" class="block p-3 text-red-400 w-full text-left mt-10 border-t border-slate-700">Logout</button>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <h1 class="text-2xl font-bold mb-8">Business Analytics</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow"><canvas id="barChart"></canvas></div>
            <div class="bg-white p-6 rounded-xl shadow"><canvas id="pieChart"></canvas></div>
        </div>
    </main>
    <script>
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: { labels: ['Q1', 'Q2', 'Q3', 'Q4'], datasets: [{ label: 'Profit', data: [12000, 19000, 3000, 5000], backgroundColor: '#8b5cf6' }] }
        });
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: { labels: ['Organic', 'Social', 'Direct'], datasets: [{ data: [300, 50, 100], backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'] }] }
        });
    </script>
</body>
</html>
