<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0f172a] flex items-center justify-center min-h-screen p-4">
    <div class="absolute top-20 right-20 w-80 h-80 bg-blue-600 opacity-10 blur-[100px] rounded-full"></div>
    <div class="absolute bottom-20 left-20 w-80 h-80 bg-[#8b5cf6] opacity-20 blur-[100px] rounded-full"></div>

    <div class="relative bg-white/5 backdrop-blur-xl border border-white/10 p-10 rounded-3xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold text-white tracking-tight">Welcome <span class="text-[#8b5cf6]">Back</span></h2>
            <p class="text-gray-400 mt-2">Enter your credentials to access the panel</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-300">Email</label>
                <div class="relative">
                    <input type="email" id="email" placeholder="admin@pro.com" required 
                        class="w-full p-4 pl-12 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-[#8b5cf6] outline-none transition-all">
                    <span class="absolute left-4 top-4 opacity-40">✉️</span>
                </div>
            </div>

            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-300">Password</label>
                <div class="relative">
                    <input type="password" id="pass" placeholder="••••••••" required 
                        class="w-full p-4 pl-12 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-[#8b5cf6] outline-none transition-all">
                    <span class="absolute left-4 top-4 opacity-40">🔒</span>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-[#8b5cf6] to-blue-600 hover:from-[#7c3aed] hover:to-blue-700 text-white p-4 rounded-xl font-bold shadow-xl shadow-purple-500/20 transform active:scale-95 transition-all">
                Login to Dashboard
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-gray-500 text-sm">Don't have an account?</p>
            <a href="signup.html" class="text-white font-bold hover:text-[#8b5cf6] transition-colors mt-1 inline-block">Register for Admin Pro</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            const users = JSON.parse(localStorage.getItem('registeredUsers')) || [];
            const found = users.find(u => u.email === email && u.password === pass);

            if (found) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(found));
                window.location.href = 'dashboard.html';
            } else {
                alert("Invalid email or password!");
            }
        };
    </script>
</body>
</html>
