<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings | Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <script>AuthService.checkAuth();</script>
</head>
<body class="bg-gray-100 flex min-h-screen transition-colors duration-300">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block shrink-0">
        <div class="text-2xl font-bold mb-10 text-purple-400">ADMIN PRO</div>
        <nav class="space-y-4">
            <a href="dashboard.html" class="block p-3 hover:bg-slate-800 rounded">Dashboard</a>
            <a href="users.html" class="block p-3 hover:bg-slate-800 rounded">Users</a>
            <a href="products.html" class="block p-3 hover:bg-slate-800 rounded">Products</a>
            <a href="analytics.html" class="block p-3 hover:bg-slate-800 rounded">Analytics</a>
            <a href="notifications.html" class="block p-3 hover:bg-slate-800 rounded">Notifications</a>
            <a href="settings.html" class="block p-3 bg-[#8b5cf6] rounded-lg shadow-lg font-bold">Settings</a>
            <button onclick="AuthService.logout()" class="block p-3 text-red-400 w-full text-left mt-10 border-t border-slate-700">Logout</button>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <div class="bg-[#8b5cf6] p-5 rounded-t-xl flex justify-between items-center shadow-lg">
            <h1 class="text-2xl font-bold text-white tracking-wide">Account Settings</h1>
            <button id="themeToggleIcon" onclick="toggleTheme()" class="bg-white/20 hover:bg-white/30 p-2 rounded-full backdrop-blur-md transition text-2xl" title="Change Theme">
                <span id="modeIcon">🌙</span>
            </button>
        </div>

        <div class="bg-white rounded-b-xl shadow-xl p-8 border border-gray-100">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                
                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-2">Profile Information</h3>
                    <form id="profileForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">Full Name</label>
                            <input type="text" id="set_name" required class="w-full p-3 mt-1 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">Email Address</label>
                            <input type="email" id="set_email" required class="w-full p-3 mt-1 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
                        </div>
                        <button type="submit" class="bg-[#8b5cf6] text-white px-6 py-2 rounded-lg font-bold hover:bg-purple-700 transition shadow-md">
                            Save Changes
                        </button>
                    </form>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-2">Security</h3>
                    <form id="passwordForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">Current Password</label>
                            <input type="password" required class="w-full p-3 mt-1 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600">New Password</label>
                            <input type="password" id="new_pass" required class="w-full p-3 mt-1 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
                        </div>
                        <button type="submit" class="bg-slate-800 text-white px-6 py-2 rounded-lg font-bold hover:bg-slate-900 transition shadow-md">
                            Update Password
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
