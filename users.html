<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/users.js"></script>
    <script>AuthService.checkAuth();</script>
</head>
<body class="bg-gray-100 flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block shrink-0">
        <div class="text-2xl font-bold mb-10 text-purple-400">ADMIN PRO</div>
        <nav class="space-y-4">
            <a href="dashboard.html" class="block p-3 hover:bg-slate-800 rounded">Dashboard</a>
            <a href="users.html" class="block p-3 bg-purple-600 rounded">Users</a>
            <a href="products.html" class="block p-3 hover:bg-slate-800 rounded">Products</a>
            <a href="analytics.html" class="block p-3 hover:bg-slate-800 rounded">Analytics</a>
            <a href="notifications.html" class="block p-3 hover:bg-slate-800 rounded">Notifications</a>
            <a href="settings.html" class="block p-3 hover:bg-slate-800 rounded">Settings</a>
            <button onclick="AuthService.logout()" class="block p-3 text-red-400 w-full text-left mt-10 border-t border-slate-700">Logout</button>
        </nav>
    </aside>

    <main class="flex-1 p-8">
    <div class="bg-[#8b5cf6] p-5 rounded-t-xl flex justify-between items-center shadow-lg">
        <h1 class="text-2xl font-bold text-white tracking-wide">User Management</h1>
        <div class="flex gap-3">
            <button onclick="exportToExcel()" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-lg backdrop-blur-md transition font-medium border border-white/30">
                📄 Export to Excel
            </button>
            <button onclick="openModal()" class="bg-white text-[#8b5cf6] px-4 py-2 rounded-lg shadow-md hover:bg-gray-100 transition font-bold">
                + Add New User
            </button>
        </div>
    </div>

    <div class="bg-white rounded-b-xl shadow-xl overflow-hidden border border-gray-100">
        <table class="w-full text-left" id="userExcelTable">
            <thead class="bg-gray-50 border-b">
                <tr class="text-gray-400 text-xs uppercase tracking-widest">
                    <th class="p-4">#</th>
                    <th class="p-4">Name</th>
                    <th class="p-4">Date Created</th>
                    <th class="p-4">Role</th>
                    <th class="p-4">Status</th>
                    <th class="p-4 text-center">Action</th>
                </tr>
            </thead>
            <tbody id="userTableBody" class="divide-y divide-gray-100">
                </tbody>
        </table>
    </div>
</main>
    <div id="userModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
            <h2 id="modalTitle" class="text-xl font-bold mb-4">Add New User</h2>
            <form id="userForm" class="space-y-4">
                <input type="hidden" id="userId">
                <input type="text" id="userName" placeholder="Full Name" required class="w-full p-2 border rounded">
                <input type="email" id="userEmail" placeholder="Email" required class="w-full p-2 border rounded">
                <select id="userRole" class="w-full p-2 border rounded">
                    <option value="Admin">Admin</option>
                    <option value="Publisher">Publisher</option>
                    <option value="Reviewer">Reviewer</option>
                    <option value="Moderator">Moderator</option>
                </select>
                <select id="userStatus" class="w-full p-2 border rounded">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                    <option value="Suspended">Suspended</option>
                </select>
                <div class="flex justify-end space-x-2 mt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-500">Cancel</button>
                    <button type="submit" class="bg-blue-500 text-white px-6 py-2 rounded font-bold">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/user.js"></script>
</body>
</html>
